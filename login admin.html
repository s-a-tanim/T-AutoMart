<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T AutoMart - Admin Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1e3a8a;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .logo span {
            color: #fbbf24;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-form {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .admin-dashboard {
            display: none;
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        h2 {
            color: #1e3a8a;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #1e3a8a;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        button {
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1c366b;
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .alert-danger {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .tab-navigation {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            width: auto;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #1e3a8a;
            border-bottom-color: #1e3a8a;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Car form styling */
        .car-form {
            background-color: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .logout-btn {
            background-color: #ef4444;
            margin-top: 1.5rem;
        }

        .logout-btn:hover {
            background-color: #dc2626;
        }

        .image-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-preview {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0.5rem;
            position: relative;
            height: 150px;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background-color: #f9fafb;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #1e3a8a;
            background-color: #f3f4f6;
        }

        .upload-icon {
            font-size: 2rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .car-list {
            margin-top: 2rem;
        }

        .car-list-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background-color: white;
            border-radius: 8px;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .car-list-image {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 1rem;
        }

        .car-list-info {
            flex: 1;
        }

        .car-list-title {
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 0.25rem;
        }

        .car-list-details {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .car-list-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit, .btn-delete {
            padding: 0.5rem;
            border-radius: 4px;
            width: auto;
        }

        .btn-edit {
            background-color: #3b82f6;
        }

        .btn-edit:hover {
            background-color: #2563eb;
        }

        .btn-delete {
            background-color: #ef4444;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .status-toggle {
            display: flex;
            align-items: center;
            margin-top: 1rem;
        }

        .status-toggle label {
            margin-right: 1rem;
            margin-bottom: 0;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #10b981;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .status-text {
            margin-left: 10px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }

        /* Responsive styling */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .login-form, .car-form {
                padding: 1.5rem;
            }
            
            .admin-dashboard {
                padding: 1rem;
            }
            
            .tab-btn {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
        }

        /* Make the logo text clickable */
a.logo {
    text-decoration: none; /* Remove default underline */
    color: inherit; /* Inherit color from the parent */
    font-weight: bold;
}

/* Optional: Add hover effect */
a.logo:hover {
    color: #007BFF; /* Change to desired color */
    text-decoration: underline; /* Underline on hover */
}

/* Prevent the color from changing when clicked (visited state) */
a.logo:visited {
    color: inherit; /* Ensure the color remains the same as the default */
}

    </style>
</head>
<body>
    <header>
    <a href="Car selling.html" class="logo">T Auto<span>Mart</span></a>
    <div id="header-actions"></div>
    </header>

    <div class="login-container" id="login-container">
        <div class="login-form">
            <h2>Admin Login</h2>
            <div id="login-alert" class="alert" style="display: none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div class="admin-dashboard" id="admin-dashboard">
        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="add-car">Add New Car</button>
            <button class="tab-btn" data-tab="manage-cars">Manage Cars</button>
        </div>

        <div id="add-car" class="tab-content active">
            <h2>Add New Vehicle</h2>
            <div id="car-form-alert" class="alert" style="display: none;"></div>
            <form id="car-form" class="car-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="car-make">Make</label>
                        <select id="car-make" name="make" required>
                            <option value="">Select Make</option>
                            <option value="toyota">Toyota</option>
                            <option value="honda">Honda</option>
                            <option value="mazda">Mazda</option>
                            <option value="nissan">Nissan</option>
                            <option value="suzuki">Suzuki</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="car-model">Model</label>
                        <input type="text" id="car-model" name="model" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="car-year">Year</label>
                        <select id="car-year" name="year" required>
                            <option value="">Select Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="car-price">Price (৳)</label>
                        <input type="number" id="car-price" name="price" min="0" step="1000" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="car-color">Color</label>
                        <input type="text" id="car-color" name="color" required>
                    </div>
                    <div class="form-group">
                        <label for="car-mileage">Mileage (km)</label>
                        <input type="number" id="car-mileage" name="mileage" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="car-description">Description</label>
                    <textarea id="car-description" name="description" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Car Status</label>
                    <div class="status-toggle">
                        <label for="car-status">Available</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="car-status" name="status" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="status-text" id="status-text">Available</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="car-images">Upload Images</label>
                    <div class="file-upload" id="file-upload">
                        <div class="upload-icon">📁</div>
                        <p>Click to upload or drag images here</p>
                        <p style="font-size: 0.8rem; color: #6b7280; margin-top: 0.5rem;">Upload multiple images at once</p>
                    </div>
                    <input type="file" id="car-images" name="images" accept="image/*" multiple style="display: none;">
                    <div class="image-preview-container" id="image-preview"></div>
                </div>

                <button type="submit">Add Vehicle</button>
            </form>
        </div>

        <div id="manage-cars" class="tab-content">
            <h2>Manage Vehicles</h2>
            <div id="car-list" class="car-list">
                <!-- Car list items will be added here dynamically -->
            </div>
        </div>

        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>

    <footer>
        <p>&copy; 2025 T AutoMart. All Rights Reserved.</p>
    </footer>

<script>
// Admin credentials (example only — should be server-side in real apps)
const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'tanim619';

// Load cars from localStorage or default
let cars = JSON.parse(localStorage.getItem('tAutoMartCars')) || [
  {
    id: 1,
    make: 'toyota',
    model: 'C-HR GT',
    year: '2022',
    price: '3700000',
    color: 'Red',
    mileage: '35420',
    description: 'Premium Japanese import in excellent condition',
    status: 'available',
    images: ['../car web/img/CHR-GT.jpg', '../car web/img/CHR-GT/front.jpg', '../car web/img/CHR-GT/dash.jpg']
  },
  {
    id: 2,
    make: 'toyota',
    model: 'Fielder Hybrid Ex',
    year: '2022',
    price: '2750000',
    color: 'White',
    mileage: '12850',
    description: 'Low mileage hybrid vehicle, fuel efficient',
    status: 'available',
    images: ['../car web/img/fielder white/front.jpg', '../car web/img/fielder white/rear.jpg']
  }
];

// DOM references
const loginContainer = document.getElementById('login-container');
const adminDashboard = document.getElementById('admin-dashboard');
const loginForm = document.getElementById('login-form');
const loginAlert = document.getElementById('login-alert');
const carForm = document.getElementById('car-form');
const carFormAlert = document.getElementById('car-form-alert');
const logoutBtn = document.getElementById('logout-btn');
const tabButtons = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
const carList = document.getElementById('car-list');
const carStatus = document.getElementById('car-status');
const statusText = document.getElementById('status-text');
const yearSelect = document.getElementById('car-year');
const fileUpload = document.getElementById('file-upload');
const carImages = document.getElementById('car-images');
const imagePreview = document.getElementById('image-preview');
const headerActions = document.getElementById('header-actions');

// Edit mode tracking
let isEditMode = false;
let editingCarId = null;

// Populate year dropdown
const currentYear = new Date().getFullYear();
for (let i = currentYear + 1; i >= currentYear - 10; i--) {
  const option = document.createElement('option');
  option.value = i;
  option.textContent = i;
  yearSelect.appendChild(option);
}

// On load
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('tAutoMartAdmin') === 'loggedIn') {
    showAdminDashboard();
    renderCarList();
  }

  carStatus.addEventListener('change', () => {
    statusText.textContent = carStatus.checked ? 'Available' : 'Sold';
  });

  fileUpload.addEventListener('click', () => carImages.click());
  carImages.addEventListener('change', handleImageUpload);
  initDragAndDrop();
});

// Login
loginForm.addEventListener('submit', e => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
    localStorage.setItem('tAutoMartAdmin', 'loggedIn');
    showAdminDashboard();
    renderCarList();
  } else {
    showAlert(loginAlert, 'Invalid username or password', 'danger');
  }
});

// Handle add/edit car
carForm.addEventListener('submit', e => {
  e.preventDefault();
  try {
    const formData = validateAndGetFormData();
    if (!formData) return;

    if (isEditMode && editingCarId !== null) {
      updateCar(editingCarId, formData);
      showAlert(carFormAlert, 'Vehicle updated successfully!', 'success');
    } else {
      addNewCar(formData);
      showAlert(carFormAlert, 'Vehicle added successfully!', 'success');
    }

    resetCarForm();
    renderCarList();
  } catch (err) {
    showAlert(carFormAlert, `Error: ${err.message}`, 'danger');
  }
});

// Unified add, update, delete with localStorage
function addNewCar(carData) {
  const newCar = { id: Date.now(), ...carData };
  cars.push(newCar);
  localStorage.setItem('tAutoMartCars', JSON.stringify(cars));
}

function updateCar(id, carData) {
  const index = cars.findIndex(c => c.id === id);
  if (index !== -1) {
    cars[index] = { id, ...carData };
    localStorage.setItem('tAutoMartCars', JSON.stringify(cars));
  } else {
    throw new Error('Car not found');
  }
}

function deleteCar(id) {
  if (confirm('Are you sure you want to delete this vehicle?')) {
    cars = cars.filter(c => c.id !== id);
    localStorage.setItem('tAutoMartCars', JSON.stringify(cars));
    renderCarList();
    if (isEditMode && editingCarId === id) resetCarForm();
  }
}

// Validate form
function validateAndGetFormData() {
  const make = document.getElementById('car-make').value.trim();
  const model = document.getElementById('car-model').value.trim();
  const year = document.getElementById('car-year').value.trim();
  const price = document.getElementById('car-price').value.trim();
  const color = document.getElementById('car-color').value.trim();
  const mileage = document.getElementById('car-mileage').value.trim();
  const description = document.getElementById('car-description').value.trim();
  const status = carStatus.checked ? 'available' : 'sold';

  if (!make || !model || !year || !price || !color || !mileage) {
    showAlert(carFormAlert, 'Please fill in all required fields', 'danger');
    return null;
  }

  const imageElements = imagePreview.querySelectorAll('img');
  const images = Array.from(imageElements).map(img => img.src);

  if (images.length === 0) {
    showAlert(carFormAlert, 'Please upload at least one image', 'danger');
    return null;
  }

  return { make, model, year, price, color, mileage, description, status, images };
}

// Reset form
function resetCarForm() {
  carForm.reset();
  imagePreview.innerHTML = '';
  statusText.textContent = 'Available';
  isEditMode = false;
  editingCarId = null;
  carForm.querySelector('button[type="submit"]').textContent = 'Add Vehicle';
}

// Image upload
function handleImageUpload() {
  const files = carImages.files;
  if (files.length === 0) return;

  Array.from(files).forEach(file => {
    if (!file.type.match('image.*')) {
      showAlert(carFormAlert, `File ${file.name} is not an image`, 'danger');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showAlert(carFormAlert, `File ${file.name} exceeds 5MB`, 'danger');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => addImagePreview(e.target.result);
    reader.onerror = () => showAlert(carFormAlert, `Error reading ${file.name}`, 'danger');
    reader.readAsDataURL(file);
  });
}

function addImagePreview(src) {
  const imgContainer = document.createElement('div');
  imgContainer.className = 'image-preview';
  const img = document.createElement('img');
  img.src = src;
  img.alt = 'Car Image';
  img.onerror = () => {
    img.src = '/api/placeholder/150/150';
    img.alt = 'Image not available';
  };

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-image';
  removeBtn.innerHTML = '×';
  removeBtn.onclick = e => {
    e.preventDefault();
    imgContainer.remove();
  };

  imgContainer.appendChild(img);
  imgContainer.appendChild(removeBtn);
  imagePreview.appendChild(imgContainer);
}

// Drag & drop
function initDragAndDrop() {
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName =>
    fileUpload.addEventListener(eventName, e => {
      e.preventDefault();
      e.stopPropagation();
    })
  );
  ['dragenter', 'dragover'].forEach(eventName =>
    fileUpload.addEventListener(eventName, () => {
      fileUpload.style.borderColor = '#1e3a8a';
      fileUpload.style.backgroundColor = '#eff6ff';
    })
  );
  ['dragleave', 'drop'].forEach(eventName =>
    fileUpload.addEventListener(eventName, () => {
      fileUpload.style.borderColor = '#d1d5db';
      fileUpload.style.backgroundColor = '#f9fafb';
    })
  );
  fileUpload.addEventListener('drop', e => {
    carImages.files = e.dataTransfer.files;
    handleImageUpload();
  });
}

// Render car list
function renderCarList() {
  carList.innerHTML = '';
  if (cars.length === 0) {
    carList.innerHTML = '<p style="text-align:center;color:#6b7280;">No vehicles available</p>';
    return;
  }

  cars.forEach(car => {
    const item = document.createElement('div');
    item.className = 'car-list-item';

    const thumb = document.createElement('img');
    thumb.src = car.images[0] || '/api/placeholder/80/60';
    thumb.alt = `${car.make} ${car.model}`;
    thumb.className = 'car-list-image';
    thumb.onerror = () => (thumb.src = '/api/placeholder/80/60');

    const info = document.createElement('div');
    info.className = 'car-list-info';

    const title = document.createElement('div');
    title.className = 'car-list-title';
    title.textContent = `${car.model} (${car.year})`;

const details = document.createElement('div');
details.className = 'car-list-details';

const statusBadge = document.createElement('span');
statusBadge.className = 'status-badge';
statusBadge.textContent = car.status === 'available' ? 'Available' : 'Sold';
statusBadge.style.backgroundColor = car.status === 'available' ? '#16a34a' : '#dc2626'; // green or red
statusBadge.style.color = 'white';
statusBadge.style.padding = '2px 8px';
statusBadge.style.borderRadius = '9999px';
statusBadge.style.marginLeft = '8px';
statusBadge.style.fontSize = '0.75rem';

details.textContent = `৳${Number(car.price).toLocaleString()} | ${car.mileage} km `;
details.appendChild(statusBadge);


    info.appendChild(title);
    info.appendChild(details);

    const actions = document.createElement('div');
    actions.className = 'car-list-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => editCar(car.id);

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-delete';
    deleteBtn.textContent = 'Delete';
    deleteBtn.onclick = () => deleteCar(car.id);

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    item.appendChild(thumb);
    item.appendChild(info);
    item.appendChild(actions);

    carList.appendChild(item);
  });
}

// Edit car
function editCar(id) {
  const car = cars.find(c => c.id === id);
  if (!car) {
    showAlert(carFormAlert, 'Car not found', 'danger');
    return;
  }

  isEditMode = true;
  editingCarId = id;

  tabButtons.forEach(btn => {
    btn.classList.remove('active');
    if (btn.getAttribute('data-tab') === 'add-car') btn.classList.add('active');
  });

  tabContents.forEach(content => {
    content.classList.remove('active');
    if (content.id === 'add-car') content.classList.add('active');
  });

  document.getElementById('car-make').value = car.make;
  document.getElementById('car-model').value = car.model;
  document.getElementById('car-year').value = car.year;
  document.getElementById('car-price').value = car.price;
  document.getElementById('car-color').value = car.color;
  document.getElementById('car-mileage').value = car.mileage;
  document.getElementById('car-description').value = car.description;
  carStatus.checked = car.status === 'available';
  statusText.textContent = car.status;

  imagePreview.innerHTML = '';
  car.images.forEach(addImagePreview);

  carForm.querySelector('button[type="submit"]').textContent = 'Update Vehicle';
}

// UI helpers
function showAdminDashboard() {
  loginContainer.style.display = 'none';
  adminDashboard.style.display = 'block';
  headerActions.innerHTML = `<span style="color:white;">Welcome, Admin</span>`;
}

function showLoginForm() {
  loginContainer.style.display = 'flex';
  adminDashboard.style.display = 'none';
  headerActions.innerHTML = '';
}

function showAlert(element, message, type) {
  element.textContent = message;
  element.className = `alert alert-${type}`;
  element.style.display = 'block';
  setTimeout(() => (element.style.display = 'none'), 5000);
}

// Logout
logoutBtn.addEventListener('click', () => {
  localStorage.removeItem('tAutoMartAdmin');
  showLoginForm();
});

// Tab switching
tabButtons.forEach(button => {
  button.addEventListener('click', () => {
    const tabId = button.getAttribute('data-tab');
    tabButtons.forEach(btn => btn.classList.remove('active'));
    button.classList.add('active');
    tabContents.forEach(content => {
      content.classList.remove('active');
      if (content.id === tabId) content.classList.add('active');
    });
  });
});
</script>
